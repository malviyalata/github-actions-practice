name: Auto Linter

on:
  push:
    paths: "*.py"

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout/Clone the code
        uses: actions/checkout@v7
        
      - name: set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
        
      - name: Install Linter
        run: pip install ruff

      - name: Check the files for linting
        run: ruff check .
        
